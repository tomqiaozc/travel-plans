<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>东京一日游 — 5月</title>
  <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
  <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyBE6HVqqrvLaqVYfOQtoJFH-xrgJtPdllw"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f5f5; }

    #app { display: flex; height: 100vh; }

    /* --- Sidebar --- */
    #sidebar {
      width: 400px; min-width: 400px;
      overflow-y: auto; background: #fff;
      border-right: 1px solid #e5e7eb;
      display: flex; flex-direction: column;
    }
    #sidebar-header {
      padding: 16px 20px; border-bottom: 1px solid #e5e7eb;
      background: #fff; position: sticky; top: 0; z-index: 10;
    }
    #sidebar-header h1 { font-size: 18px; font-weight: 700; color: #1f2937; }
    #sidebar-header p { font-size: 12px; color: #9ca3af; margin-top: 4px; }
    #sidebar-content { padding: 12px; flex: 1; }

    /* --- Day group --- */
    .day-group {
      border-left: 4px solid #ccc;
      border-radius: 8px; padding: 12px;
      margin-bottom: 12px; background: #fafafa;
    }
    .day-group-header {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 8px;
    }
    .day-group-title { font-size: 14px; font-weight: 700; color: #374151; }
    .day-nav-link {
      font-size: 11px; color: #3b82f6; text-decoration: none;
      padding: 2px 8px; border: 1px solid #3b82f6; border-radius: 4px;
    }
    .day-nav-link:hover { background: #3b82f6; color: #fff; }

    .place-list { min-height: 40px; }
    .place-list-empty { text-align: center; color: #9ca3af; font-size: 12px; padding: 12px 0; }

    /* --- Place card --- */
    .place-card {
      background: #fff; border: 1px solid #e5e7eb; border-radius: 8px;
      padding: 10px 12px; margin-bottom: 6px; cursor: grab;
      transition: box-shadow 0.15s, transform 0.15s;
    }
    .place-card:hover { border-color: #93c5fd; }
    .place-card.sortable-ghost { opacity: 0.4; }
    .place-card.sortable-chosen { box-shadow: 0 8px 25px rgba(0,0,0,0.15); transform: scale(1.02); }

    .place-name {
      font-size: 13px; font-weight: 600; color: #1f2937;
      display: flex; align-items: center; gap: 6px;
    }
    .place-type-badge {
      font-size: 10px; padding: 1px 6px; border-radius: 9999px;
      font-weight: 500;
    }
    .type-attraction { background: #dbeafe; color: #1d4ed8; }
    .type-restaurant { background: #fef3c7; color: #92400e; }
    .type-shopping { background: #fce7f3; color: #9d174d; }
    .type-hotel { background: #e0e7ff; color: #4338ca; }
    .type-other { background: #f3f4f6; color: #6b7280; }

    .place-meta { font-size: 11px; color: #6b7280; margin-top: 4px; }
    .place-desc { font-size: 12px; color: #4b5563; margin-top: 4px; }
    .place-tips { font-size: 11px; color: #9ca3af; margin-top: 2px; }
    .place-link {
      font-size: 11px; color: #3b82f6; text-decoration: none; margin-top: 4px;
      display: inline-block;
    }
    .place-link:hover { color: #1d4ed8; }
    .place-distance {
      font-size: 11px; color: #3b82f6; margin-top: 2px;
    }

    /* --- Map --- */
    #map-container { flex: 1; position: relative; }
    #map { width: 100%; height: 100%; }

    /* --- Legend --- */
    #legend {
      position: absolute; bottom: 12px; left: 12px;
      background: rgba(255,255,255,0.92); border-radius: 8px;
      padding: 8px 12px; box-shadow: 0 1px 4px rgba(0,0,0,0.15);
      display: flex; gap: 12px; font-size: 12px; z-index: 5;
    }
    .legend-item { display: flex; align-items: center; gap: 4px; cursor: pointer; }
    .legend-item:hover { opacity: 0.7; }
    .legend-dot {
      width: 12px; height: 12px; border-radius: 50%;
      border: 2px solid #fff; box-shadow: 0 0 2px rgba(0,0,0,0.3);
    }

    /* --- Mobile --- */
    @media (max-width: 768px) {
      #app { flex-direction: column; }
      #sidebar { width: 100%; min-width: unset; height: 50vh; border-right: none; border-bottom: 1px solid #e5e7eb; }
      #map-container { height: 50vh; }
    }
  </style>
</head>
<body>
<div id="app">
  <div id="sidebar">
    <div id="sidebar-header">
      <h1 id="trip-title"></h1>
      <p id="trip-subtitle"></p>
    </div>
    <div id="sidebar-content"></div>
  </div>
  <div id="map-container">
    <div id="map"></div>
    <div id="legend"></div>
  </div>
</div>

<script>
const TRIP_DATA = {
  "id": "tokyo-202505",
  "title": "東京一日游",
  "subtitle": "5月 · 独自出行 · 购物 + 美食",
  "total_days": 1,
  "day_labels": {
    "1": "银座→原宿→涩谷"
  },
  "places": [
    {
      "name": "五代目花山乌円 日本桥店",
      "city": "东京",
      "type": "restaurant",
      "day_number": 1,
      "order_in_day": 1,
      "latitude": 35.6811441,
      "longitude": 139.77465279999998,
      "google_place_id": "ChIJrQBKK_mJGGAR71nTXnVxbfI",
      "google_maps_url": "https://maps.google.com/?cid=17468743278556043759",
      "description": "配天妇罗的冷花山乌円，面条细滑筋道，芝麻蘸酱超香",
      "tips": "建议10:30前到，银座店人多务必去日本桥店",
      "stay_duration": "45分钟"
    },
    {

      "city": "东京",
      "type": "shopping",
      "day_number": 1,
      "order_in_day": 2,
      "latitude": 35.6697688,
      "longitude": 139.76417619999998,
      "google_place_id": "ChIJAQAsR--LGGAR_AmB8WMDy88",
      "google_maps_url": "https://maps.google.com/?cid=14973065113911757308",
      "description": "银座地标商场，楼顶花园免费开放，视野开阔",
      "tips": "地下美食层伴手礼选择丰富",
      "stay_duration": "1小时"
    },
    {
      "name": "银座三越 / 松本清",
      "city": "东京",
      "type": "shopping",
      "day_number": 1,
      "order_in_day": 3,
      "latitude": 35.6712864,
      "longitude": 139.7657382,
      "google_place_id": "ChIJX9MhjuaLGGARvoMvduRK-5E",
      "google_maps_url": "https://maps.google.com/?cid=10519083699749749694",
      "description": "三越顶楼金鱼水族馆（需提前预约）；松本清买护肤彩妆",
      "tips": "银座四丁目十字路口核心位置",
      "stay_duration": "45分钟"
    },
    {
      "name": "银座篭 本店",
      "city": "东京",
      "type": "restaurant",
      "day_number": 1,
      "order_in_day": 4,
      "latitude": 35.6712019,
      "longitude": 139.76133149999998,
      "google_place_id": "ChIJjykJZCCLGGARMx5vYqRsWYI",
      "google_maps_url": "https://maps.google.com/?cid=9392657951139765811",
      "description": "鸡白汤拉面，浓郁不腻，不像传统日式拉面那么咸",
      "tips": "在小巷子里需仔细看导航，排队多但翻台快",
      "stay_duration": "40分钟"
    },
    {
      "name": "表参道 Hills",
      "city": "东京",
      "type": "shopping",
      "day_number": 1,
      "order_in_day": 5,
      "latitude": 35.6672869,
      "longitude": 139.7086162,
      "google_place_id": "ChIJCx6jgqGMGGARpfB5UIap15k",
      "google_maps_url": "https://maps.google.com/?cid=11085515402136645797",
      "description": "东京潮流高地，国际品牌旗舰店，建筑设计本身就是看点",
      "tips": "银座→表参道：地铁银座线约15分钟",
      "stay_duration": "1.5小时"
    },
    {
      "name": "竹下通 / 原宿",
      "city": "东京",
      "type": "shopping",
      "day_number": 1,
      "order_in_day": 6,
      "latitude": 35.6710335,
      "longitude": 139.7051821,
      "google_place_id": "ChIJlVne8bqMGGARtX5O6ojMvsI",
      "google_maps_url": "https://maps.google.com/?cid=14032878377351675573",
      "description": "年轻潮流聚集地，泡泡玛特、三丽鸥、日系潮牌、古着店",
      "tips": "人流量大注意随身物品，路边可丽饼值得一试",
      "stay_duration": "1小时"
    },
    {
      "name": "烤肉ホルモン うしひろ 涩谷店",
      "city": "东京",
      "type": "restaurant",
      "day_number": 1,
      "order_in_day": 7,
      "latitude": 35.6623489,
      "longitude": 139.6954849,
      "google_place_id": "ChIJg4iJy3eNGGARxASQgtVV4tc",
      "google_maps_url": "https://maps.google.com/?cid=15556090438397985988",
      "description": "Google评分4.8！推荐炙烤牛肉配海胆、拼牛舌、横膈膜",
      "tips": "有中文菜单，建议提前预约，有服务员帮烤",
      "stay_duration": "1.5小时"
    },
    {
      "name": "涩谷十字路口",
      "city": "东京",
      "type": "attraction",
      "day_number": 1,
      "order_in_day": 8,
      "latitude": 35.659482,
      "longitude": 139.7005596,
      "google_place_id": "ChIJK9EM68qLGGARacmu4KJj5SA",
      "google_maps_url": "https://maps.google.com/?cid=2370410330085837161",
      "description": "世界最繁忙十字路口，傍晚灯光亮起时最震撼",
      "tips": "TSUTAYA大楼星巴克二楼是经典俯瞰拍摄点（免费）",
      "stay_duration": "30分钟"
    }
  ]
};

const DAY_COLORS = ['#ef4444','#3b82f6','#22c55e','#eab308','#a855f7','#ec4899','#6366f1'];
const DAY_BG     = ['#fef2f2','#eff6ff','#f0fdf4','#fefce8','#faf5ff','#fdf2f8','#eef2ff'];
const DAY_BORDER = ['#f87171','#60a5fa','#4ade80','#facc15','#c084fc','#f472b6','#818cf8'];
const TYPE_ICONS = { attraction: '🏛️', restaurant: '🍜', shopping: '🛍️', hotel: '🏨', other: '📍' };

const STORAGE_KEY = 'travel-plan-order-' + (TRIP_DATA.id || document.title);

let places = TRIP_DATA.places || [];
let map, infoWindow;
let markers = [];
let polylines = [];

function saveOrder() {
  const order = {};
  places.forEach(p => { order[p.name] = { day_number: p.day_number, order_in_day: p.order_in_day }; });
  localStorage.setItem(STORAGE_KEY, JSON.stringify(order));
}

function loadOrder() {
  try {
    const saved = JSON.parse(localStorage.getItem(STORAGE_KEY));
    if (!saved) return;
    places.forEach(p => {
      if (saved[p.name]) {
        p.day_number = saved[p.name].day_number;
        p.order_in_day = saved[p.name].order_in_day;
      }
    });
  } catch {}
}

function haversineKm(lat1, lon1, lat2, lon2) {
  const toRad = d => d * Math.PI / 180;
  return Math.acos(
    Math.sin(toRad(lat1)) * Math.sin(toRad(lat2)) +
    Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) * Math.cos(toRad(lon2 - lon1))
  ) * 6371;
}

function groupByDay() {
  const days = {};
  const totalDays = TRIP_DATA.total_days || 1;
  for (let d = 1; d <= totalDays; d++) days[d] = [];
  places.forEach(p => {
    const d = p.day_number || 'unassigned';
    if (!days[d]) days[d] = [];
    days[d].push(p);
  });
  Object.values(days).forEach(arr => arr.sort((a, b) => (a.order_in_day || 0) - (b.order_in_day || 0)));
  return days;
}

function dayNavUrl(dayPlaces) {
  const pts = dayPlaces
    .filter(p => p.latitude && p.longitude)
    .map(p => p.google_place_id ? 'place_id:' + p.google_place_id : p.latitude + ',' + p.longitude);
  if (pts.length === 0) return '';
  return 'https://www.google.com/maps/dir/' + pts.join('/');
}

function renderSidebar() {
  const days = groupByDay();
  const container = document.getElementById('sidebar-content');
  container.innerHTML = '';

  document.getElementById('trip-title').textContent = TRIP_DATA.title || 'Travel Plan';
  document.getElementById('trip-subtitle').textContent = TRIP_DATA.subtitle || '';

  const sortedKeys = Object.keys(days).sort((a, b) => {
    if (a === 'unassigned') return 1;
    if (b === 'unassigned') return -1;
    return Number(a) - Number(b);
  });

  sortedKeys.forEach(dayKey => {
    const dayPlaces = days[dayKey];
    const isUnassigned = dayKey === 'unassigned';
    const dayNum = isUnassigned ? null : Number(dayKey);
    const colorIdx = dayNum ? (dayNum - 1) % DAY_COLORS.length : -1;

    const group = document.createElement('div');
    group.className = 'day-group';
    group.style.borderLeftColor = colorIdx >= 0 ? DAY_BORDER[colorIdx] : '#d1d5db';
    group.style.background = colorIdx >= 0 ? DAY_BG[colorIdx] : '#f9fafb';

    const header = document.createElement('div');
    header.className = 'day-group-header';

    const dayInfo = TRIP_DATA.day_labels && TRIP_DATA.day_labels[dayKey];
    const title = document.createElement('span');
    title.className = 'day-group-title';
    title.textContent = isUnassigned ? 'Unassigned' : (dayInfo ? `Day ${dayNum} — ${dayInfo}` : `Day ${dayNum}`);
    header.appendChild(title);

    if (!isUnassigned && dayPlaces.length > 0) {
      const navUrl = dayNavUrl(dayPlaces);
      if (navUrl) {
        const navLink = document.createElement('a');
        navLink.className = 'day-nav-link';
        navLink.href = navUrl;
        navLink.target = '_blank';
        navLink.textContent = 'Navigate ↗';
        header.appendChild(navLink);
      }
    }
    group.appendChild(header);

    const list = document.createElement('div');
    list.className = 'place-list';
    list.dataset.day = dayKey;

    if (dayPlaces.length === 0) {
      const empty = document.createElement('div');
      empty.className = 'place-list-empty';
      empty.textContent = 'Drag places here';
      list.appendChild(empty);
    }

    dayPlaces.forEach((place, idx) => {
      const card = document.createElement('div');
      card.className = 'place-card';
      card.dataset.placeName = place.name;

      let html = '<div class="place-name">';
      html += `<span>${TYPE_ICONS[place.type] || TYPE_ICONS.other}</span>`;
      if (place.google_maps_url) {
        html += `<a href="${place.google_maps_url}" target="_blank" class="place-link" style="font-size:13px;font-weight:600;color:#1f2937;text-decoration:none;">${place.name}</a>`;
      } else {
        html += `<span>${place.name}</span>`;
      }
      html += `<span class="place-type-badge type-${place.type || 'other'}">${place.type || 'other'}</span>`;
      html += '</div>';

      if (place.stay_duration) html += `<div class="place-meta">⏰ ${place.stay_duration}</div>`;
      if (place.description) html += `<div class="place-desc">💡 ${place.description}</div>`;
      if (place.tips) html += `<div class="place-tips">📝 ${place.tips}</div>`;
      if (place.google_maps_url) html += `<a href="${place.google_maps_url}" target="_blank" class="place-link">Google Maps ↗</a>`;

      if (idx > 0) {
        const prev = dayPlaces[idx - 1];
        if (prev.latitude && prev.longitude && place.latitude && place.longitude) {
          const dist = haversineKm(prev.latitude, prev.longitude, place.latitude, place.longitude);
          if (dist > 0) html += `<div class="place-distance">↕ ${dist.toFixed(1)} km</div>`;
        }
      }

      card.innerHTML = html;
      card.addEventListener('click', (e) => {
        if (e.target.tagName === 'A') return;
        if (place.latitude && place.longitude) {
          map.panTo({ lat: place.latitude, lng: place.longitude });
          map.setZoom(15);
          showInfoWindow(place);
        }
      });
      list.appendChild(card);
    });

    group.appendChild(list);
    container.appendChild(group);

    new Sortable(list, {
      group: 'places',
      animation: 150,
      ghostClass: 'sortable-ghost',
      chosenClass: 'sortable-chosen',
      onEnd: function() {
        updateOrderFromDOM();
        saveOrder();
        renderSidebar();
        renderMap();
      }
    });
  });
}

function updateOrderFromDOM() {
  const lists = document.querySelectorAll('.place-list');
  lists.forEach(list => {
    const dayKey = list.dataset.day;
    const cards = list.querySelectorAll('.place-card');
    cards.forEach((card, idx) => {
      const name = card.dataset.placeName;
      const place = places.find(p => p.name === name);
      if (place) {
        place.day_number = dayKey === 'unassigned' ? null : Number(dayKey);
        place.order_in_day = idx + 1;
      }
    });
  });
}

function renderMap() {
  markers.forEach(m => m.setMap(null));
  polylines.forEach(p => p.setMap(null));
  markers = [];
  polylines = [];

  const days = groupByDay();
  const bounds = new google.maps.LatLngBounds();
  let hasPoints = false;

  Object.entries(days).forEach(([dayKey, dayPlaces]) => {
    if (dayKey === 'unassigned') return;
    const dayNum = Number(dayKey);
    const color = DAY_COLORS[(dayNum - 1) % DAY_COLORS.length];
    const path = [];

    dayPlaces.forEach((place, idx) => {
      if (!place.latitude || !place.longitude) return;
      const pos = { lat: place.latitude, lng: place.longitude };
      bounds.extend(pos);
      hasPoints = true;
      path.push(pos);

      const marker = new google.maps.Marker({
        position: pos, map,
        icon: {
          path: google.maps.SymbolPath.CIRCLE,
          scale: 8, fillColor: color, fillOpacity: 1,
          strokeColor: '#fff', strokeWeight: 2,
        },
        title: place.name, zIndex: 100 + idx,
      });

      marker.addListener('click', () => showInfoWindow(place));
      markers.push(marker);
    });

    if (path.length >= 2) {
      const polyline = new google.maps.Polyline({
        path, strokeColor: color, strokeWeight: 2,
        strokeOpacity: 0.8, geodesic: true, map,
      });
      polylines.push(polyline);
    }
  });

  if (hasPoints) map.fitBounds(bounds, 50);
  renderLegend(days);
}

function showInfoWindow(place) {
  if (!place.latitude || !place.longitude) return;
  const mapsLink = place.google_maps_url
    ? `<a href="${place.google_maps_url}" target="_blank" style="font-size:12px;color:#2563eb;margin-top:6px;display:inline-block;">Open in Google Maps ↗</a>`
    : '';
  infoWindow.setContent(`
    <div style="padding:4px 8px;max-width:220px;">
      <div style="font-weight:600;font-size:14px;">${place.name}</div>
      <div style="font-size:12px;color:#888;margin-top:2px;">${place.type || ''}${place.day_number ? ' · Day ' + place.day_number : ''}</div>
      ${place.description ? `<div style="font-size:12px;color:#666;margin-top:4px;">${place.description}</div>` : ''}
      ${mapsLink}
    </div>
  `);
  infoWindow.setPosition({ lat: place.latitude, lng: place.longitude });
  infoWindow.open(map);
}

function renderLegend(days) {
  const legend = document.getElementById('legend');
  legend.innerHTML = '';
  const dayNums = Object.keys(days).filter(k => k !== 'unassigned').map(Number).sort((a, b) => a - b);
  dayNums.forEach(d => {
    const item = document.createElement('div');
    item.className = 'legend-item';
    item.innerHTML = `<span class="legend-dot" style="background:${DAY_COLORS[(d-1) % DAY_COLORS.length]}"></span><span style="color:#4b5563;">Day ${d}</span>`;
    item.addEventListener('click', () => {
      const dayPlaces = (groupByDay()[d] || []).filter(p => p.latitude && p.longitude);
      if (dayPlaces.length === 0) return;
      const bounds = new google.maps.LatLngBounds();
      dayPlaces.forEach(p => bounds.extend({ lat: p.latitude, lng: p.longitude }));
      map.fitBounds(bounds, 50);
    });
    legend.appendChild(item);
  });
}

function init() {
  loadOrder();
  map = new google.maps.Map(document.getElementById('map'), {
    center: { lat: 35.6812, lng: 139.7671 },
    zoom: 11,
    gestureHandling: 'greedy',
    mapTypeControl: false,
    streetViewControl: false,
  });
  infoWindow = new google.maps.InfoWindow();
  renderSidebar();
  renderMap();
}

window.addEventListener('load', init);
</script>
</body>
</html>
