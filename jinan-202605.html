rder_in_day": 5, "latitude": 36.686232, "longitude": 117.065923, "amap_place_id": "B021306MFC", "amap_url": "https://uri.amap.com/marker?position=117.065923,36.686232&name=%E6%B4%AA%E5%AE%B6%E6%A5%BC%E6%95%99%E5%A0%82&coordinate=gaode", "description": "哥特式天主教堂，济南最美教堂，拍照超出片", "tips": "", "stay_duration": "40分钟"}, {"name": "洪家楼社区馄饨", "city": "济南", "type": "restaurant", "day_number": 4, "order_in_day": 6, "latitude": 36.673475, "longitude": 117.044625, "amap_place_id": "B0G3FRMTVB", "amap_url": "https://uri.amap.com/marker?position=117.044625,36.673475&name=%E6%B4%AA%E5%AE%B6%E6%A5%BC%E7%A4%BE%E5%8C%BA%E9%A6%84%E9%A5%A8&coordinate=gaode", "description": "居民楼下老爷爷包的馄饨，皮薄馅大", "tips": "茶叶蛋也好吃", "stay_duration": "20分钟"}, {"name": "金珠面馆", "city": "济南", "type": "restaurant", "day_number": 4, "order_in_day": 7, "latitude": 36.682967, "longitude": 117.064235, "amap_place_id": "B0I33MPCQ3", "amap_url": "https://uri.amap.com/marker?position=117.064235,36.682967&name=%E9%87%91%E7%8F%A0%E9%9D%A2%E9%A6%86&coordinate=gaode", "description": "好运鱼面和炸串是招牌", "tips": "当地人爱去的小馆子", "stay_duration": "30分钟"}]};

const DAY_COLORS = ['#ef4444','#3b82f6','#22c55e','#eab308','#a855f7','#ec4899','#6366f1'];
const DAY_BG     = ['#fef2f2','#eff6ff','#f0fdf4','#fefce8','#faf5ff','#fdf2f8','#eef2ff'];
const DAY_BORDER = ['#f87171','#60a5fa','#4ade80','#facc15','#c084fc','#f472b6','#818cf8'];
const TYPE_ICONS = { attraction: '🏛️', restaurant: '🍜', shopping: '🛍️', hotel: '🏨', other: '📍' };

const STORAGE_KEY = 'travel-plan-order-' + (TRIP_DATA.id || document.title);

let places = TRIP_DATA.places || [];
let map, infoWindow;
let markers = [];
let polylines = [];

function saveOrder() {
  const order = {};
  places.forEach(p => { order[p.name] = { day_number: p.day_number, order_in_day: p.order_in_day }; });
  localStorage.setItem(STORAGE_KEY, JSON.stringify(order));
}

function loadOrder() {
  try {
    const saved = JSON.parse(localStorage.getItem(STORAGE_KEY));
    if (!saved) return;
    places.forEach(p => {
      if (saved[p.name]) {
        p.day_number = saved[p.name].day_number;
        p.order_in_day = saved[p.name].order_in_day;
      }
    });
  } catch {}
}

function haversineKm(lat1, lon1, lat2, lon2) {
  const toRad = d => d * Math.PI / 180;
  return Math.acos(
    Math.sin(toRad(lat1)) * Math.sin(toRad(lat2)) +
    Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) * Math.cos(toRad(lon2 - lon1))
  ) * 6371;
}

function groupByDay() {
  const days = {};
  const totalDays = TRIP_DATA.total_days || 1;
  for (let d = 1; d <= totalDays; d++) days[d] = [];
  places.forEach(p => {
    const d = p.day_number || 'unassigned';
    if (!days[d]) days[d] = [];
    days[d].push(p);
  });
  Object.values(days).forEach(arr => arr.sort((a, b) => (a.order_in_day || 0) - (b.order_in_day || 0)));
  return days;
}

function getMapUrl(place) {
  return place.amap_url || place.google_maps_url || '';
}

function dayNavUrl(dayPlaces) {
  const pts = dayPlaces.filter(p => p.latitude && p.longitude);
  if (pts.length === 0) return '';
  const origin = pts[0];
  const dest = pts[pts.length - 1];
  const mid = pts.slice(1, -1).map(p => `${p.longitude},${p.latitude}`).join(';');
  let url = `https://uri.amap.com/navigation?from=${origin.longitude},${origin.latitude},${encodeURIComponent(origin.name)}&to=${dest.longitude},${dest.latitude},${encodeURIComponent(dest.name)}&mode=bus&coordinate=gaode`;
  if (mid) url += `&via=${mid}`;
  return url;
}

function renderSidebar() {
  const days = groupByDay();
  const container = document.getElementById('sidebar-content');
  container.innerHTML = '';

  document.getElementById('trip-title').textContent = TRIP_DATA.title || 'Travel Plan';
  document.getElementById('trip-subtitle').textContent = TRIP_DATA.subtitle || '';

  const sortedKeys = Object.keys(days).sort((a, b) => {
    if (a === 'unassigned') return 1;
    if (b === 'unassigned') return -1;
    return Number(a) - Number(b);
  });

  sortedKeys.forEach(dayKey => {
    const dayPlaces = days[dayKey];
    const isUnassigned = dayKey === 'unassigned';
    const dayNum = isUnassigned ? null : Number(dayKey);
    const colorIdx = dayNum ? (dayNum - 1) % DAY_COLORS.length : -1;

    const group = document.createElement('div');
    group.className = 'day-group';
    group.style.borderLeftColor = colorIdx >= 0 ? DAY_BORDER[colorIdx] : '#d1d5db';
    group.style.background = colorIdx >= 0 ? DAY_BG[colorIdx] : '#f9fafb';

    const header = document.createElement('div');
    header.className = 'day-group-header';

    const dayInfo = TRIP_DATA.day_labels && TRIP_DATA.day_labels[dayKey];
    const title = document.createElement('span');
    title.className = 'day-group-title';
    title.textContent = isUnassigned ? '未分配' : (dayInfo ? `第 ${dayNum} 天 — ${dayInfo}` : `第 ${dayNum} 天`);
    header.appendChild(title);

    if (!isUnassigned && dayPlaces.length > 0) {
      const navUrl = dayNavUrl(dayPlaces);
      if (navUrl) {
        const navLink = document.createElement('a');
        navLink.className = 'day-nav-link';
        navLink.href = navUrl;
        navLink.target = '_blank';
        navLink.textContent = '导航 ↗';
        header.appendChild(navLink);
      }
    }
    group.appendChild(header);

    const list = document.createElement('div');
    list.className = 'place-list';
    list.dataset.day = dayKey;

    if (dayPlaces.length === 0) {
      const empty = document.createElement('div');
      empty.className = 'place-list-empty';
      empty.textContent = '拖拽地点到这里';
      list.appendChild(empty);
    }

    dayPlaces.forEach((place, idx) => {
      const card = document.createElement('div');
      card.className = 'place-card';
      card.dataset.placeName = place.name;

      const mapUrl = getMapUrl(place);
      let html = '<div class="place-name">';
      html += `<span>${TYPE_ICONS[place.type] || TYPE_ICONS.other}</span>`;
      if (mapUrl) {
        html += `<a href="${mapUrl}" target="_blank" class="place-link" style="font-size:13px;font-weight:600;color:#1f2937;text-decoration:none;">${place.name}</a>`;
      } else {
        html += `<span>${place.name}</span>`;
      }
      html += `<span class="place-type-badge type-${place.type || 'other'}">${place.type || 'other'}</span>`;
      html += '</div>';

      if (place.stay_duration) html += `<div class="place-meta">⏰ ${place.stay_duration}</div>`;
      if (place.description) html += `<div class="place-desc">💡 ${place.description}</div>`;
      if (place.tips) html += `<div class="place-tips">📝 ${place.tips}</div>`;
      if (mapUrl) html += `<a href="${mapUrl}" target="_blank" class="place-link">高德地图 ↗</a>`;

      if (idx > 0) {
        const prev = dayPlaces[idx - 1];
        if (prev.latitude && prev.longitude && place.latitude && place.longitude) {
          const dist = haversineKm(prev.latitude, prev.longitude, place.latitude, place.longitude);
          if (dist > 0) html += `<div class="place-distance">↕ ${dist.toFixed(1)} km</div>`;
        }
      }

      card.innerHTML = html;
      card.addEventListener('click', (e) => {
        if (e.target.tagName === 'A') return;
        if (place.latitude && place.longitude) {
          map.setCenter([place.longitude, place.latitude]);
          map.setZoom(15);
          showInfoWindow(place);
        }
      });
      list.appendChild(card);
    });

    group.appendChild(list);
    container.appendChild(group);

    new Sortable(list, {
      group: 'places',
      animation: 150,
      ghostClass: 'sortable-ghost',
      chosenClass: 'sortable-chosen',
      onEnd: function() {
        updateOrderFromDOM();
        saveOrder();
        renderSidebar();
        renderMap();
      }
    });
  });
}

function updateOrderFromDOM() {
  const lists = document.querySelectorAll('.place-list');
  lists.forEach(list => {
    const dayKey = list.dataset.day;
    const cards = list.querySelectorAll('.place-card');
    cards.forEach((card, idx) => {
      const name = card.dataset.placeName;
      const place = places.find(p => p.name === name);
      if (place) {
        place.day_number = dayKey === 'unassigned' ? null : Number(dayKey);
        place.order_in_day = idx + 1;
      }
    });
  });
}

function renderMap() {
  markers.forEach(m => map.remove(m));
  polylines.forEach(p => map.remove(p));
  markers = [];
  polylines = [];

  const days = groupByDay();
  const allMarkers = [];

  Object.entries(days).forEach(([dayKey, dayPlaces]) => {
    if (dayKey === 'unassigned') return;
    const dayNum = Number(dayKey);
    const color = DAY_COLORS[(dayNum - 1) % DAY_COLORS.length];
    const path = [];

    dayPlaces.forEach((place, idx) => {
      if (!place.latitude || !place.longitude) return;
      const pos = [place.longitude, place.latitude];
      path.push(pos);

      const marker = new AMap.Marker({
        position: pos,
        content: `<div style="background:${color};color:#fff;width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:bold;border:2px solid #fff;box-shadow:0 1px 4px rgba(0,0,0,0.3);">${idx + 1}</div>`,
        offset: new AMap.Pixel(-12, -12),
        title: place.name,
      });
      marker.on('click', () => showInfoWindow(place));
      map.add(marker);
      markers.push(marker);
      allMarkers.push(marker);
    });

    if (path.length >= 2) {
      const polyline = new AMap.Polyline({
        path: path,
        strokeColor: color,
        strokeWeight: 3,
        strokeOpacity: 0.8,
      });
      map.add(polyline);
      polylines.push(polyline);
    }
  });

  if (allMarkers.length > 0) {
    map.setFitView(allMarkers, false, [50, 50, 50, 50]);
    if (map.getZoom() < 11) map.setZoom(11);
  }

  renderLegend(days);
}

function showInfoWindow(place) {
  if (!place.latitude || !place.longitude) return;
  const mapUrl = getMapUrl(place);
  const mapsLink = mapUrl
    ? `<a href="${mapUrl}" target="_blank" style="font-size:12px;color:#2563eb;margin-top:6px;display:inline-block;">在高德地图中打开 ↗</a>`
    : '';
  if (infoWindow) infoWindow.close();
  infoWindow = new AMap.InfoWindow({
    content: `
      <div style="padding:4px 8px;max-width:220px;">
        <div style="font-weight:600;font-size:14px;">${place.name}</div>
        <div style="font-size:12px;color:#888;margin-top:2px;">
          ${place.type || ''}${place.day_number ? ' · 第 ' + place.day_number + ' 天' : ''}
        </div>
        ${place.description ? `<div style="font-size:12px;color:#666;margin-top:4px;">${place.description}</div>` : ''}
        ${mapsLink}
      </div>
    `,
    offset: new AMap.Pixel(0, -12),
  });
  infoWindow.open(map, [place.longitude, place.latitude]);
}

function renderLegend(days) {
  const legend = document.getElementById('legend');
  legend.innerHTML = '';
  const dayNums = Object.keys(days).filter(k => k !== 'unassigned').map(Number).sort((a, b) => a - b);
  dayNums.forEach(d => {
    const item = document.createElement('div');
    item.className = 'legend-item';
    item.innerHTML = `<span class="legend-dot" style="background:${DAY_COLORS[(d-1) % DAY_COLORS.length]}"></span><span style="color:#4b5563;">第 ${d} 天</span>`;
    item.addEventListener('click', () => {
      const dayPlaces = (groupByDay()[d] || []).filter(p => p.latitude && p.longitude);
      if (dayPlaces.length === 0) return;
      const dayMarkers = markers.filter((m, i) => {
        const allDayIdxs = [];
        let offset = 0;
        const days2 = groupByDay();
        for (const [dk, dp] of Object.entries(days2)) {
          if (dk === 'unassigned') continue;
          const valid = dp.filter(p => p.latitude && p.longitude);
          if (Number(dk) === d) {
            for (let j = 0; j < valid.length; j++) allDayIdxs.push(offset + j);
          }
          offset += valid.length;
        }
        return allDayIdxs.includes(i);
      });
      if (dayMarkers.length > 0) map.setFitView(dayMarkers, false, [50, 50, 50, 50]);
    });
    legend.appendChild(item);
  });
}

function init() {
  loadOrder();

  const firstPlace = places.find(p => p.latitude && p.longitude);
  const center = firstPlace ? [firstPlace.longitude, firstPlace.latitude] : [116.397428, 39.90923];

  map = new AMap.Map('map', {
    center: center,
    zoom: 11,
    mapStyle: 'amap://styles/normal',
  });

  renderSidebar();
  renderMap();
}

window.addEventListener('load', init);
</script>
